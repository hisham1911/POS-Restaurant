<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار وضع POS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        button.secondary {
            background: #6c757d;
        }
        button.secondary:hover {
            background: #545b62;
        }
        button.danger {
            background: #dc3545;
        }
        button.danger:hover {
            background: #c82333;
        }
        .info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            border-right: 4px solid #007bff;
            margin: 15px 0;
        }
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔧 اختبار وضع POS</h1>
        <p>استخدم هذه الصفحة لاختبار وتغيير وضع نقطة البيع</p>
    </div>

    <div class="card">
        <h2>📊 الحالة الحالية</h2>
        <div id="status" class="status"></div>
        
        <div class="info">
            <strong>ملاحظة:</strong> الوضع محفوظ في <code>localStorage</code> بمفتاح <code>pos_mode</code>
        </div>
    </div>

    <div class="card">
        <h2>⚙️ تغيير الوضع</h2>
        <button onclick="setMode('cashier')">🛒 وضع الكاشير</button>
        <button onclick="setMode('standard')">✨ الوضع الأساسي</button>
        <button class="secondary" onclick="checkMode()">🔄 تحديث الحالة</button>
        <button class="danger" onclick="clearMode()">🗑️ مسح الإعدادات</button>
    </div>

    <div class="card">
        <h2>🧪 اختبارات</h2>
        <button onclick="testRedirect()">🔗 اختبار التوجيه</button>
        <button onclick="openPOS()">📱 فتح POS</button>
        <button onclick="openWorkspace()">💼 فتح Workspace</button>
    </div>

    <div class="card">
        <h2>📝 السجل</h2>
        <div id="log" style="background: #f8f9fa; padding: 15px; border-radius: 8px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 14px;"></div>
    </div>

    <script>
        const POS_MODE_KEY = 'pos_mode';
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString('ar-EG');
            const emoji = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            logDiv.innerHTML += `<div style="margin: 5px 0;">[${time}] ${emoji} ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function setMode(mode) {
            try {
                localStorage.setItem(POS_MODE_KEY, mode);
                log(`تم تعيين الوضع إلى: ${mode}`, 'success');
                checkMode();
            } catch (error) {
                log(`خطأ: ${error.message}`, 'error');
            }
        }

        function checkMode() {
            const mode = localStorage.getItem(POS_MODE_KEY);
            const statusDiv = document.getElementById('status');
            
            if (!mode) {
                statusDiv.className = 'status warning';
                statusDiv.innerHTML = '⚠️ لم يتم تعيين وضع (سيستخدم الافتراضي: cashier)';
                log('لم يتم العثور على وضع محفوظ');
            } else if (mode === 'cashier') {
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '🛒 الوضع الحالي: وضع الكاشير (Cashier Mode)';
                log('الوضع الحالي: cashier');
            } else if (mode === 'standard') {
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✨ الوضع الحالي: الوضع الأساسي (Standard Mode)';
                log('الوضع الحالي: standard');
            } else {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ وضع غير صحيح: ${mode}`;
                log(`وضع غير معروف: ${mode}`, 'error');
            }
        }

        function clearMode() {
            if (confirm('هل أنت متأكد من مسح إعدادات الوضع؟')) {
                localStorage.removeItem(POS_MODE_KEY);
                log('تم مسح الإعدادات', 'success');
                checkMode();
            }
        }

        function testRedirect() {
            const mode = localStorage.getItem(POS_MODE_KEY) || 'cashier';
            log(`اختبار التوجيه للوضع: ${mode}`);
            
            if (mode === 'cashier') {
                log('✅ يجب أن يبقى في /pos');
                log('❌ يجب أن يوجه من /pos-workspace إلى /pos');
            } else {
                log('❌ يجب أن يوجه من /pos إلى /pos-workspace');
                log('✅ يجب أن يبقى في /pos-workspace');
            }
        }

        function openPOS() {
            log('فتح صفحة POS...');
            window.open('/pos', '_blank');
        }

        function openWorkspace() {
            log('فتح صفحة Workspace...');
            window.open('/pos-workspace', '_blank');
        }

        // Initialize
        checkMode();
        log('تم تحميل صفحة الاختبار', 'success');
        log('استخدم الأزرار أعلاه لتغيير الوضع واختبار التوجيه');
    </script>
</body>
</html>
