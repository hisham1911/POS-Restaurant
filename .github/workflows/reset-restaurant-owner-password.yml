name: Reset Restaurant Owner Password

on:
  workflow_dispatch:

jobs:
  reset-owner-password:
    runs-on: ubuntu-latest
    env:
      DOTNET_VERSION: 8.0.x
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
      VPS_SERVICE_NAME: ${{ secrets.VPS_SERVICE_NAME }}
      VPS_HEALTH_PORT: ${{ secrets.VPS_HEALTH_PORT }}
      RESET_OWNER_PASSWORD: ${{ secrets.RESTAURANT_OWNER_RESET_PASSWORD }}

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Reset Tool
        run: |
          set -euo pipefail

          TOOL_DIR="/tmp/kp-owner-reset"
          mkdir -p "$TOOL_DIR"

          cat > "$TOOL_DIR/KpOwnerReset.csproj" <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <ImplicitUsings>enable</ImplicitUsings>
              <Nullable>enable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="BCrypt.Net-Next" Version="4.0.3" />
              <PackageReference Include="Microsoft.Data.Sqlite.Core" Version="8.0.11" />
              <PackageReference Include="SQLitePCLRaw.provider.e_sqlcipher" Version="2.1.6" />
              <PackageReference Include="SQLitePCLRaw.lib.e_sqlcipher" Version="2.1.6" />
            </ItemGroup>
          </Project>
          EOF

          cat > "$TOOL_DIR/Program.cs" <<'EOF'
          using Microsoft.Data.Sqlite;

          if (args.Length != 1)
          {
              Console.Error.WriteLine("Usage: KpOwnerReset <db-path>");
              return 2;
          }

          var dbPath = args[0];
          var dbPassword = Environment.GetEnvironmentVariable("KASSERPRO_DB_PASSWORD");
          var newPassword = Environment.GetEnvironmentVariable("RESET_OWNER_PASSWORD");

          if (string.IsNullOrWhiteSpace(newPassword))
          {
              Console.Error.WriteLine("RESET_OWNER_PASSWORD is required.");
              return 3;
          }

          SQLitePCL.raw.SetProvider(new SQLitePCL.SQLite3Provider_e_sqlcipher());

          var builder = new SqliteConnectionStringBuilder
          {
              DataSource = dbPath,
              Cache = SqliteCacheMode.Default,
              Pooling = false
          };

          if (!string.IsNullOrWhiteSpace(dbPassword))
          {
              builder.Password = dbPassword;
          }

          using var connection = new SqliteConnection(builder.ConnectionString);
          connection.Open();

          using (var verify = connection.CreateCommand())
          {
              verify.CommandText = "SELECT COUNT(*) FROM Users WHERE Email = 'owner@kasserpro.com' AND Role = 2;";
              var ownerCount = Convert.ToInt32(verify.ExecuteScalar());
              if (ownerCount != 1)
              {
                  Console.Error.WriteLine($"Expected one SystemOwner row, found {ownerCount}.");
                  return 4;
              }
          }

          var hash = BCrypt.Net.BCrypt.HashPassword(newPassword);
          var securityStamp = Guid.NewGuid().ToString();

          using (var update = connection.CreateCommand())
          {
              update.CommandText = @"
                  UPDATE Users
                  SET PasswordHash = $hash,
                      SecurityStamp = $securityStamp,
                      IsActive = 1
                  WHERE Email = 'owner@kasserpro.com'
                    AND Role = 2;";
              update.Parameters.AddWithValue("$hash", hash);
              update.Parameters.AddWithValue("$securityStamp", securityStamp);

              var rows = update.ExecuteNonQuery();
              if (rows != 1)
              {
                  Console.Error.WriteLine($"Password reset updated {rows} rows.");
                  return 5;
              }
          }

          Console.WriteLine("SystemOwner password and security stamp reset successfully.");
          return 0;
          EOF

          dotnet publish "$TOOL_DIR/KpOwnerReset.csproj" \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -o "$TOOL_DIR/out"

      - name: Validate Secrets
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          for name in VPS_HOST RESET_OWNER_PASSWORD VPS_SSH_KEY; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Setup SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          PORT="${VPS_SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "ssh-keyscan failed after 5 attempts" >&2
              exit 1
            fi
            sleep 5
          done
          chmod 644 ~/.ssh/known_hosts

      - name: Upload Reset Tool
        run: |
          set -euo pipefail

          PORT="${VPS_SSH_PORT:-22}"
          USER_NAME="${VPS_USER:-root}"
          ssh -p "$PORT" "${USER_NAME}@${VPS_HOST}" "rm -rf /tmp/KpOwnerResetTool && mkdir -p /tmp/KpOwnerResetTool"
          scp -P "$PORT" -r /tmp/kp-owner-reset/out/. "${USER_NAME}@${VPS_HOST}:/tmp/KpOwnerResetTool/"

      - name: Reset Password On VPS
        run: |
          set -euo pipefail

          PORT="${VPS_SSH_PORT:-22}"
          USER_NAME="${VPS_USER:-root}"
          APP_DIR="${VPS_APP_DIR:-/var/www/kasserpro-restaurant}"
          SERVICE_NAME="${VPS_SERVICE_NAME:-kasserpro-restaurant}"
          HEALTH_PORT="${VPS_HEALTH_PORT:-5244}"
          RESET_OWNER_PASSWORD_B64="$(printf '%s' "$RESET_OWNER_PASSWORD" | base64 -w0)"

          ssh -p "$PORT" "${USER_NAME}@${VPS_HOST}" "bash -s -- '$APP_DIR' '$SERVICE_NAME' '$HEALTH_PORT' '$RESET_OWNER_PASSWORD_B64'" <<'EOF'
          set -euo pipefail

          APP_DIR="$1"
          SERVICE_NAME="$2"
          HEALTH_PORT="$3"
          RESET_OWNER_PASSWORD="$(printf '%s' "$4" | base64 -d)"
          DB_PATH="${APP_DIR}/kasserpro.db"

          if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
          else
            SUDO="sudo"
          fi

          cleanup() {
            $SUDO systemctl start "$SERVICE_NAME" || true
            $SUDO rm -rf /tmp/KpOwnerResetTool || true
          }
          trap cleanup EXIT

          DB_PASSWORD=""
          ENVIRONMENT_LINE="$($SUDO systemctl show -p Environment --value "$SERVICE_NAME" || true)"
          for item in $ENVIRONMENT_LINE; do
            case "$item" in
              KASSERPRO_DB_PASSWORD=*)
                DB_PASSWORD="${item#KASSERPRO_DB_PASSWORD=}"
                ;;
            esac
          done

          TS="$(date +%Y%m%d-%H%M%S)"
          BACKUP_DIR="${APP_DIR}/backups/owner-reset-${TS}"

          $SUDO mkdir -p "$BACKUP_DIR"
          if [ -f "$DB_PATH" ]; then
            $SUDO cp -a "$DB_PATH" "${BACKUP_DIR}/kasserpro.db.bak"
          fi
          if [ -f "${DB_PATH}-wal" ]; then
            $SUDO cp -a "${DB_PATH}-wal" "${BACKUP_DIR}/kasserpro.db-wal.bak"
          fi
          if [ -f "${DB_PATH}-shm" ]; then
            $SUDO cp -a "${DB_PATH}-shm" "${BACKUP_DIR}/kasserpro.db-shm.bak"
          fi

          WAS_ACTIVE=0
          if $SUDO systemctl is-active --quiet "$SERVICE_NAME"; then
            WAS_ACTIVE=1
            $SUDO systemctl stop "$SERVICE_NAME"
          fi

          $SUDO chmod +x /tmp/KpOwnerResetTool/KpOwnerReset
          if [ -n "$SUDO" ]; then
            RESET_OWNER_PASSWORD="$RESET_OWNER_PASSWORD" \
              KASSERPRO_DB_PASSWORD="$DB_PASSWORD" \
              $SUDO -E /tmp/KpOwnerResetTool/KpOwnerReset "$DB_PATH"
          else
            RESET_OWNER_PASSWORD="$RESET_OWNER_PASSWORD" \
              KASSERPRO_DB_PASSWORD="$DB_PASSWORD" \
              /tmp/KpOwnerResetTool/KpOwnerReset "$DB_PATH"
          fi

          $SUDO systemctl start "$SERVICE_NAME"
          $SUDO systemctl is-active --quiet "$SERVICE_NAME"

          if command -v curl >/dev/null 2>&1; then
            curl -fsS "http://127.0.0.1:${HEALTH_PORT}/api/health"
          fi

          $SUDO journalctl -u "$SERVICE_NAME" -n 20 --no-pager || true

          echo "Backup directory: $BACKUP_DIR"
          EOF
